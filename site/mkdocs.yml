site_name: JMeter-Plugins.org
site_url: https://jmeter-plugins.org/
site_description: Custom plugins for Apache JMeter

docs_dir: .mkdocs_src
site_dir: build

use_directory_urls: true

markdown_extensions:
  - md_in_html
  - toc:
      permalink: false

theme:
  name: null
  custom_dir: theme

extra:
