server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Trailing slash for wiki/install/stats directories
    location ~ ^/(wiki|install|stats|catalogue)/[^/]+$ {
        return 301 $uri/;
    }

    # Static site
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    # Dynamic backend for plugin repository API
    # Uncomment and adjust when the /repo/ backend is ready:
    # location /repo/ {
    #     proxy_pass http://repo-backend:8090/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Cache static assets
    location ~* \.(css|js|png|jpg|gif|svg|ico|json|csv)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    error_page 404 /404.html;
}
